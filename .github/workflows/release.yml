name: Release Chrome Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up release variables
        run: |
          echo "TAG_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=poe2-marketwright-${GITHUB_REF_NAME}-chrome-extension.zip" >> "$GITHUB_ENV"

      - name: Validate manifest JSON
        run: python -m json.tool manifest.json > /dev/null

      - name: Build extension package
        run: |
          mkdir -p dist/poe2-marketwright
          cp manifest.json dist/poe2-marketwright/
          cp background.js dist/poe2-marketwright/
          cp pob-copy.js dist/poe2-marketwright/
          cp favorites.js dist/poe2-marketwright/
          cp currency-conversion.js dist/poe2-marketwright/
          cp content.js dist/poe2-marketwright/
          cp content.css dist/poe2-marketwright/
          cp favorites-panel.html dist/poe2-marketwright/
          cp favorites-panel.js dist/poe2-marketwright/
          cp favorites-panel.css dist/poe2-marketwright/
          cp page-bridge.js dist/poe2-marketwright/
          cp README.md dist/poe2-marketwright/
          cp -R data dist/poe2-marketwright/
          cp -R images dist/poe2-marketwright/
          cp -R _locales dist/poe2-marketwright/

      - name: Validate packaged extension files
        run: |
          python <<'PY'
          import json
          import glob
          import pathlib
          import sys

          root = pathlib.Path("dist/poe2-marketwright")
          manifest = json.loads((root / "manifest.json").read_text())

          required = set(manifest.get("icons", {}).values())
          required.update(manifest.get("action", {}).get("default_icon", {}).values())
          background = manifest.get("background", {}).get("service_worker")
          if background:
              required.add(background)

          for content_script in manifest.get("content_scripts", []):
              required.update(content_script.get("js", []))
              required.update(content_script.get("css", []))

          wildcard_resources = set()
          for resource_group in manifest.get("web_accessible_resources", []):
              for resource in resource_group.get("resources", []):
                  if glob.has_magic(resource):
                      wildcard_resources.add(resource)
                  else:
                      required.add(resource)

          default_locale = manifest.get("default_locale")
          if default_locale:
              required.add(f"_locales/{default_locale}/messages.json")

          missing = sorted(path for path in required if not (root / path).exists())
          missing.extend(sorted(path for path in wildcard_resources if not list(root.glob(path))))
          if missing:
              print("Missing packaged files:")
              for path in missing:
                  print(f"- {path}")
              sys.exit(1)
          PY

      - name: Create zip archive
        run: |
          cd dist/poe2-marketwright
          zip -r "../${ASSET_NAME}" .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ASSET_NAME }}
          generate_release_notes: true
